name: Release

# Cross-compile for Linux (x86_64, aarch64) and macOS (x86_64, arm64) and
# publish the artifacts to a GitHub Release on a `v*` tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Linux targets are built in the same image as dev/CI.
  build-in-docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            name: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose build build-release

      # Run the same image as dev/CI, but without the target-cache volume, so
      # the binary is written to the host workspace where Package can find it.
      - name: Cross-compile ${{ matrix.target }}
        run: |
          docker run --rm -v "$PWD":/app -w /app \
            linux-audit-mcp:dev \
            cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIR=linux-audit-mcp-${TAG}-${{ matrix.name }}
          mkdir -p "$DIR"
          cp target/${{ matrix.target }}/release/linux-audit-mcp "$DIR"/
          cp LICENSE README.md "$DIR"/
          tar czf "${DIR}.tar.gz" "$DIR"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: linux-audit-mcp-*.tar.gz

  # Cross-building macOS from a Linux image is impractical (needs osxcross+SDK),
  # so we use a native macOS runner.
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-amd64
          - target: aarch64-apple-darwin
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build ${{ matrix.target }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          DIR=linux-audit-mcp-${TAG}-${{ matrix.name }}
          mkdir -p "$DIR"
          cp target/${{ matrix.target }}/release/linux-audit-mcp "$DIR"/
          cp LICENSE README.md "$DIR"/
          tar czf "${DIR}.tar.gz" "$DIR"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: linux-audit-mcp-*.tar.gz

  release:
    needs: [ build-in-docker, build-macos ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
